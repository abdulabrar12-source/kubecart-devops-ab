apiVersion: v1
kind: ConfigMap
metadata:
  name: kubecart-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"   # picked up by the Grafana sidecar
data:
  kubecart-dashboard.json: |
    {
      "id": null,
      "uid": "kubecart-overview",
      "title": "KubeCart — Service Overview",
      "tags": ["kubecart"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "service",
            "type": "query",
            "label": "Service",
            "datasource": "Prometheus",
            "query": "label_values(http_requests_received_total, service)",
            "multi": true,
            "includeAll": true,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(http_requests_received_total{service=~\"$service\"}[1m])) by (service)",
              "legendFormat": "{{service}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": { "mode": "palette-classic" }
            }
          }
        },
        {
          "id": 2,
          "title": "Error Rate (5xx req/s)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(http_requests_received_total{service=~\"$service\", code=~\"5..\"}[1m])) by (service)",
              "legendFormat": "{{service}} errors"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": { "mode": "fixed", "fixedColor": "red" },
              "custom": { "thresholdsStyle": { "mode": "area" } },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red",   "value": 0.01 }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "Request Duration — p50 / p95 / p99",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{service=~\"$service\"}[1m])) by (le, service))",
              "legendFormat": "p50 {{service}}"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{service=~\"$service\"}[1m])) by (le, service))",
              "legendFormat": "p95 {{service}}"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{service=~\"$service\"}[1m])) by (le, service))",
              "legendFormat": "p99 {{service}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 4,
          "title": "In-Flight Requests",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(http_requests_in_progress{service=~\"$service\"}) by (service)",
              "legendFormat": "{{service}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 5,
          "title": "Total Requests (last 1 h)",
          "type": "stat",
          "gridPos": { "x": 0, "y": 16, "w": 6, "h": 4 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(increase(http_requests_received_total{service=~\"$service\"}[1h]))",
              "legendFormat": "Total"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 6,
          "title": "Total Errors (last 1 h)",
          "type": "stat",
          "gridPos": { "x": 6, "y": 16, "w": 6, "h": 4 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(increase(http_requests_received_total{service=~\"$service\", code=~\"5..\"}[1h]))",
              "legendFormat": "Errors"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red",   "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          }
        },
        {
          "id": 7,
          "title": "Pod CPU Usage",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 4 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"demo\", container!=\"\"}[1m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        }
      ]
    }
