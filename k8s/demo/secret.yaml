# identity-secret — only identity-service mounts this.
# Contains DB creds + JWT signing key + AES encryption key for PII.
apiVersion: v1
kind: Secret
metadata:
  name: identity-secret
  namespace: demo
type: Opaque
data:
  # echo -n 'sa' | base64
  DB_USER: c2E=
  # echo -n 'YourStrong@Pass123' | base64
  DB_PASSWORD: WW91clN0cm9uZ0BQYXNzMTIz
  # HMAC-SHA256 signing key — must be ≥32 bytes.
  # REPLACE before deploying to any shared environment.
  JWT_SIGNING_KEY: eW91ci1qd3Qtc2VjcmV0LW1pbi0zMi1jaGFycy1oZXJl
  # AES-256 key — must be exactly 32 bytes.
  # REPLACE before deploying to any shared environment.
  APP_ENCRYPTION_KEY: eW91ci1hcHAtZW5jcnlwdGlvbi1rZXktMzItY2hhcnM=
---
# catalog-secret — only catalog-service mounts this.
# Contains DB creds + JWT signing key (for validating admin tokens).
apiVersion: v1
kind: Secret
metadata:
  name: catalog-secret
  namespace: demo
type: Opaque
data:
  DB_USER: c2E=
  DB_PASSWORD: WW91clN0cm9uZ0BQYXNzMTIz
  JWT_SIGNING_KEY: eW91ci1qd3Qtc2VjcmV0LW1pbi0zMi1jaGFycy1oZXJl
---
# order-secret — only order-service mounts this.
