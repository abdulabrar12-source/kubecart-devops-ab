apiVersion: v1
kind: Secret
metadata:
  name: kubecart-secret
  namespace: demo
type: Opaque
data:
  # echo -n 'sa' | base64
  DB_USER: c2E=
  # echo -n 'YourStrong@Pass123' | base64
  DB_PASSWORD: WW91clN0cm9uZ0BQYXNzMTIz
  # HMAC-SHA256 signing key — must be ≥32 bytes.
  # echo -n 'your-jwt-signing-key-min-32-chars!!' | base64
  # REPLACE before deploying to any shared environment.
  JWT_SIGNING_KEY: eW91ci1qd3Qtc2VjcmV0LW1pbi0zMi1jaGFycy1oZXJl
  # AES-256 encryption key — must be exactly 32 bytes.
  # echo -n 'your-app-encryption-key-32-chars' | base64
  # REPLACE before deploying to any shared environment.
  APP_ENCRYPTION_KEY: eW91ci1hcHAtZW5jcnlwdGlvbi1rZXktMzItY2hhcnM=
