apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: demo
  labels:
    app: identity-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "80"
    spec:
      containers:
        - name: identity-service
          image: identity-service:latest
          imagePullPolicy: Never          # image pre-loaded into minikube via: minikube image load
          ports:
            - containerPort: 80
          # Non-secret config injected from ConfigMap
          envFrom:
            - configMapRef:
                name: identity-configmap
          # Secret values injected individually from kubecart-secret
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: kubecart-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubecart-secret
                  key: DB_PASSWORD
            - name: JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: kubecart-secret
                  key: JWT_SIGNING_KEY
            - name: APP_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: kubecart-secret
                  key: APP_ENCRYPTION_KEY
          # startupProbe gives the service up to 150 s to finish DB initialisation
          # before liveness/readiness probes begin.
          startupProbe:
            httpGet:
              path: /health
              port: 80
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
