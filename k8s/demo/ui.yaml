# DEPRECATED — Todo UI Deployment + NodePort Service (namespace: demo, NGINX_API_HOST: api-service:80).
# Replaced by the frontend Deployment + Service in k8s/kubecart/
# with IDENTITY_SERVICE_HOST, CATALOG_SERVICE_HOST, ORDER_SERVICE_HOST env vars.
# Safe to delete this file once git mv k8s/demo k8s/kubecart is complete.

spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: ui
          image: ui-image:v2
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          env:
            - name: NGINX_API_HOST
              value: "api-service:80"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ui-service
  namespace: demo
  labels:
    app: ui
spec:
  type: NodePort
  selector:
    app: ui
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30081
      targetPort: 80
