apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: demo
  labels:
    app: catalog-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "80"
    spec:
      containers:
        - name: catalog-service
          image: catalog-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: catalog-configmap
          # Secret values injected from catalog-secret (least-privilege: only catalog mounts this Secret)
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: catalog-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: catalog-secret
                  key: DB_PASSWORD
            # Required for validating JWT on admin endpoints (POST/PUT/DELETE /api/catalog/admin/*)
            - name: JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: catalog-secret
                  key: JWT_SIGNING_KEY
          startupProbe:
            httpGet:
              path: /health
              port: 80
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
